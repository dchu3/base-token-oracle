openapi: 3.1.0
info:
  title: base-token-oracle
  version: 0.1.0
  summary: x402-gated Base token intelligence for AI agents.
  description: |
    Pay-per-call HTTP service that provides on-chain forensics and security reports 
    for Base (chainId 8453) tokens. Powered by Blockscout. Paid routes are gated 
    by [x402 v2](https://docs.cdp.coinbase.com/x402/welcome) and settle in USDC on Base.
  license:
    name: MIT
  contact:
    url: https://github.com/dchu3/base-token-oracle
x-x402:
  protocol: x402-v2
  network: base
  chainId: 8453
  token: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
  tokenSymbol: USDC
  spec: https://docs.cdp.coinbase.com/x402/welcome
  prices:
    "GET /api/v1/x402/base/token/{address}/report": "0.01"

servers:
  - url: https://base-token-oracle.example.com
    description: Replace with operator host on deploy.

tags:
  - name: free
    description: Unmetered endpoints (no payment required).
  - name: x402-paid
    description: x402 v2 paid endpoints. Settled in USDC on Base mainnet.

paths:
  /healthz:
    get:
      tags: [free]
      summary: Liveness probe.
      operationId: getHealth
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean, const: true }
              example: { ok: true }

  /api/v1/x402/base/token/{address}/report:
    get:
      tags: [x402-paid]
      summary: On-chain forensics and security report.
      operationId: getTokenReport
      description: |
        Returns token metadata, deployer profile, holder distribution, and LP-lock
        heuristics for any Base ERC-20. Sourced from Blockscout via MCP.
      x-x402-price: "0.01"
      parameters:
        - $ref: "#/components/parameters/TokenAddress"
        - name: pair
          in: query
          required: false
          description: Optional LP pair address to trigger LP-lock heuristic.
          schema:
            type: string
            pattern: "^0x[a-fA-F0-9]{40}$"
      responses:
        "200":
          description: Token report.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportResponse" }
              example: { $ref: "#/components/examples/ReportExample/value" }
        "400": { $ref: "#/components/responses/InvalidAddress" }
        "402": { $ref: "#/components/responses/PaymentRequired" }
        "404":
          description: Token not found on Base Blockscout.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
              example: { error: "token_not_found" }
        "502": { $ref: "#/components/responses/UpstreamFailure" }

components:
  parameters:
    TokenAddress:
      name: address
      in: path
      required: true
      description: ERC-20 contract address on Base (lowercased in response).
      schema:
        type: string
        pattern: "^0x[a-fA-F0-9]{40}$"
      example: "0x4200000000000000000000000000000000000006"

  responses:
    InvalidAddress:
      description: Address does not match `0x[0-9a-fA-F]{40}`.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { error: "invalid_address" }
    UpstreamFailure:
      description: Upstream MCP (Blockscout) failed or returned an invalid shape.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example: { error: "upstream_failure" }
    PaymentRequired:
      description: |
        x402 v2 payment challenge. Client must sign a USDC `transferWithAuthorization`
        for the declared amount and re-request with `X-PAYMENT: <base64(payload)>`.
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: 'x402 realm="base-token-oracle"'
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PaymentRequirements" }
          example:
            x402Version: 2
            accepts:
              - scheme: exact
                network: base
                maxAmountRequired: "10000"
                resource: "/api/v1/x402/base/token/0x4200000000000000000000000000000000000006/report"
                description: "Token security report."
                payTo: "0xYourReceivingAddressHere"
                maxTimeoutSeconds: 60
                asset: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"
                extra:
                  name: "USD Coin"
                  version: "2"

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        detail: { type: string }

    PaymentRequirements:
      type: object
      required: [x402Version, accepts]
      properties:
        x402Version: { type: integer, const: 2 }
        accepts:
          type: array
          items:
            type: object
            required: [scheme, network, maxAmountRequired, resource, payTo, asset]
            properties:
              scheme: { type: string, example: "exact" }
              network: { type: string, example: "base" }
              maxAmountRequired: { type: string, example: "10000" }
              resource: { type: string }
              payTo: { type: string }
              asset: { type: string }

    ReportResponse:
      type: object
      required:
        [address, chain, token, deployer, token_activity, holder_count, top10_concentration_pct, deployer_holdings_pct, lp_locked_heuristic, flags]
      properties:
        address: { type: string }
        chain: { type: string, const: "base" }
        token:
          type: object
          required: [name, symbol, decimals, total_supply, circulating_market_cap, exchange_rate, type, verified]
          properties:
            name: { type: string, nullable: true }
            symbol: { type: string, nullable: true }
            decimals: { type: integer, nullable: true }
            total_supply: { type: string, nullable: true }
            circulating_market_cap: { type: string, nullable: true }
            exchange_rate: { type: string, nullable: true }
            type: { type: string, nullable: true }
            verified: { type: boolean, nullable: true }
        deployer:
          nullable: true
          type: object
          required: [address, is_contract, tx_count, coin_balance, creation_tx_hash, last_active_timestamp]
          properties:
            address: { type: string }
            is_contract: { type: boolean, nullable: true }
            tx_count: { type: integer, nullable: true }
            coin_balance: { type: string, nullable: true }
            creation_tx_hash: { type: string, nullable: true }
            last_active_timestamp: { type: string, nullable: true }
        token_activity:
          nullable: true
          type: object
          required: [last_active_timestamp, recent_methods]
          properties:
            last_active_timestamp: { type: string, nullable: true }
            recent_methods:
              type: array
              items: { type: string }
              nullable: true
        holder_count: { type: integer, nullable: true }
        top10_concentration_pct: { type: number, nullable: true }
        deployer_holdings_pct: { type: number, nullable: true }
        lp_locked_heuristic: { type: boolean, nullable: true }
        flags:
          type: array
          items:
            type: string
            enum: [high_concentration, deployer_holds_large, unverified_contract, lp_locked]

  examples:
    ReportExample:
      value:
        address: "0x4200000000000000000000000000000000000006"
        chain: "base"
        token:
          name: "Wrapped Ether"
          symbol: "WETH"
          decimals: 18
          total_supply: "140238472812345678901234"
          circulating_market_cap: "1000000000"
          exchange_rate: "2500.50"
          type: "ERC-20"
          verified: true
        deployer:
          address: "0x4200000000000000000000000000000000000000"
          is_contract: true
          tx_count: 12
          coin_balance: "1000000000000000000"
          creation_tx_hash: "0xabc123..."
          last_active_timestamp: "2026-04-29T12:00:00Z"
        token_activity:
          last_active_timestamp: "2026-04-29T12:15:00Z"
          recent_methods: ["transfer", "approve"]
        holder_count: 312104
        top10_concentration_pct: 34.12
        deployer_holdings_pct: 0
        lp_locked_heuristic: null
        flags: []
