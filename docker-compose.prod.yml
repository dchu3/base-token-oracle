# Production stack: oracle + Caddy (auto-TLS).
#
# Must be invoked from the parent directory that holds both necessary repos,
# because the build context is `..` relative to this file.
#
#   cd <parent>
#   DOMAIN=base-oracle.example.com \
#     docker compose -f base-token-oracle/docker-compose.prod.yml up -d --build
#
# Required env (via shell or base-token-oracle/.env):
#   RECEIVING_ADDRESS, FACILITATOR_URL, DOMAIN
# Optional: PRICE_REPORT, CACHE_TTL_MS

services:
  oracle:
    build:
      context: ..
      dockerfile: base-token-oracle/Dockerfile
      target: runtime
    image: base-token-oracle:latest
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    labels:
      com.base-token-oracle.role: "upstream"
      caddy.upstream: "oracle:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - oracle
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN=your.host before docker compose up}
      # Optional: override the ACME issuer when Let's Encrypt is rate-limiting.
      # Common values:
      #   ACME_CA=https://acme-staging-v02.api.letsencrypt.org/directory  (untrusted staging certs, no per-domain limit)
      #   ACME_CA=https://acme.zerossl.com/v2/DV90                         (ZeroSSL — separate quota from LE)
      # Defaults to Let's Encrypt production (5 duplicate certs per
      # exact-identifier set per 168h — see https://letsencrypt.org/docs/rate-limits/).
      ACME_CA: ${ACME_CA:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # IMPORTANT: caddy_data persists ACME account keys + issued certs.
      # Do NOT run `docker compose down -v` casually — destroying this
      # volume forces fresh cert issuance on next start and can trip
      # Let's Encrypt's "5 duplicate certs / 168h" rate limit.
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
